<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Rock Paper Scissors</title>

    <link rel="stylesheet" href="style.css">
    <script defer src="script.js"></script>

</head>
<body>

    <!-- Main Page -->

    <!-- Page1 -->

    <div id="gameNameIntro">

        <div id="container1">
            <h1 class="intro">Welcome</h1>
            <h1 class="intro">To</h1>
            <h1 class="intro">Rock Paper Scissor</h1>
        </div>

    </div>

    <!-- Page2 -->

    <div id="gameChoiceIntro">

        <div id="container2">
            <h1 class="intro2">Make</h1>
            <h1 class="intro2">Your</h1>
            <h1 class="intro2">Choice</h1>
        </div>

    </div>

    <!-- Page3 -->

    <div class="choice" id="choiceRock"></div>
    <div class="choice" id="choiceScissor"></div>
    <div class="choice" id="choicePaper"></div>

    <!-- Computer reply Page -->

    <div class="computerChoice" id="computerChoiceRock"></div>
    <div class="computerChoice" id="computerChoicePaper"></div>
    <div class="computerChoice" id="computerChoiceScissor"></div>

    <!-- User choice clone pages -->

    <div class="choice2" id="choiceRock2"></div>
    <div class="choice2" id="choiceScissor2"></div>
    <div class="choice2" id="choicePaper2"></div>

    <!-- The final page with a msg who won -->

    <div id="finalPage">

        <div id="finalMsgContainer">

            <h1 id="finalMsg"></h1>
            <button id="playAgain">Play Again</button>

        </div>

    </div>
    
</body>
</html>
